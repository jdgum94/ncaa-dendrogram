<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCAA Tournament Probabilities</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; }
        #controls { margin: 20px; font-size: 16px; }
        select { font-size: 16px; padding: 4px; }
        
        /* The standard state of the lines */
        .link { fill: none; stroke: #e0e0e0; stroke-width: 1.5px; transition: stroke 0.2s; }
        /* The highlighted state of the lines when hovered */
        .link--active { stroke: #333; stroke-width: 2.5px; }
        
        /* The standard state of the dots */
        .node circle { fill: #999; stroke: #fff; stroke-width: 1.5px; transition: fill 0.2s; }
        /* The highlighted state of the dots when hovered */
        .node--active circle { fill: #000; }
        
        /* The text styling for the teams */
        .node text { font: 10px sans-serif; transition: font-weight 0.2s; }
        /* Make the team name bold when hovered */
        .node--active text { font-weight: bold; fill: #000; }
        
        /* The background labels for East, West, South, Midwest */
        .region-label { font-size: 28px; font-weight: bold; fill: #e8e8e8; pointer-events: none; }

        /* The dynamic probability text */
        .prob-label {
            font-size: 11px;
            font-weight: bold;
            fill: #0000ee;
            pointer-events: none;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 0px 2px 2px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>
    <div id="controls">
        <label for="dataSource">Projection Model: </label>
        <select id="dataSource">
            <option value="kenpom">KenPom</option>
            <option value="miya">EvanMiya</option>
        </select>
    </div>
    <div id="bracket-container"></div>

    <script src="app.js"></script>
</body>
</html>
