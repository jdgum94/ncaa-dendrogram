<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Explorer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        
        #controls { margin: 15px auto 0 auto; font-size: 16px; position: relative; z-index: 10; }
        select { font-size: 16px; padding: 4px; }
        
        #bracket-container { margin-top: -40px; }
        
        .link { fill: none; stroke: #e0e0e0; stroke-width: 1.5px; transition: stroke-width 0.2s; }
        .link--active { stroke: #e0e0e0; stroke-width: 3.5px; }
        
        .node circle { fill: #999; stroke: #fff; stroke-width: 1.5px; transition: fill 0.2s; }
        .node--active circle { fill: #666; }
        
        .node text { font: 10px sans-serif; transition: font-weight 0.2s; }
        .node--active text { font-weight: bold; fill: #000; }
        
        .region-label { font-size: 28px; font-weight: bold; fill: #e8e8e8; pointer-events: none; }

        .prob-label {
            font-size: 11px;
            font-weight: bold;
            fill: #0000ee;
            pointer-events: none;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 0px 2px 2px rgba(0,0,0,0.2); 
        }

        /* NEW: The Floating Chalk Tooltip */
        #chalk-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #ddd;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            z-index: 1000;
            text-align: left;
        }
        .mini-link { fill: none; stroke: #ccc; stroke-width: 1.5px; }
        .mini-node text { font-size: 10.5px; fill: #444; }
        .mini-node--root text { fill: #0000ee; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div id="controls">
        <label for="dataSource">Model: </label>
        <select id="dataSource">
            <option value="kenpom">KP</option>
            <option value="miya">EM(i)</option>
            <option value="torvik">BT</option>
            <option value="wab">WAB</option>
        </select>
    </div>
    
    <div id="bracket-container"></div>
    <div id="chalk-tooltip"></div> <script src="app.js"></script>
</body>
</html>
